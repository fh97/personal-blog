name: Deploy Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build blog server
        run: |
          rm -f go.sum
          go mod tidy
          go build -o blog-server .
        env:
          GOPROXY: https://proxy.golang.org,direct
          GONOSUMDB: '*'
          GOFLAGS: '-mod=mod'

      - name: Generate static files
        run: |
          ./blog-server &
          SERVER_PID=$!

          # 等待服务就绪，最多 15 秒
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8300/ > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            echo "Waiting for server... ${i}s"
            sleep 1
          done

          mkdir -p ./public

          # 抓取首页
          curl -sf http://localhost:8300/ > ./public/index.html

          # 抓取各标签页
          for tag in Go Blog Web Git AI Spec "工程效能" "最佳实践" "版本控制"; do
            encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$tag'))")
            curl -sf "http://localhost:8300/?tag=${encoded}" > "./public/index-tag-${tag}.html" || true
          done

          # 抓取所有文章详情页，存为 post/{slug}/index.html（让 /post/slug 路径可访问）
          for slug in build-blog-with-go spec-driven-development go-error-handling git-knowledge-guide; do
            mkdir -p "./public/post/${slug}"
            curl -sf "http://localhost:8300/post/${slug}" > "./public/post/${slug}/index.html" || true
          done

          kill $SERVER_PID || true

          # 修复绝对路径链接，补全 /personal-blog 子路径前缀
          find ./public -name "*.html" | xargs sed -i \
            -e 's|href="/"|href="/personal-blog/"|g' \
            -e 's|href="/post/|href="/personal-blog/post/|g' \
            -e 's|href="/?tag=|href="/personal-blog/?tag=|g'

          touch ./public/.nojekyll

          echo "=== Generated files ==="
          find ./public -name "*.html" | xargs wc -l 2>/dev/null

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
