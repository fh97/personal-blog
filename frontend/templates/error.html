{{define "title"}}{{.Code}} - 出错了{{end}}

{{define "content"}}
<main class="min-h-screen flex items-center justify-center px-4 py-20">
    <div class="max-w-md w-full text-center">
        <!-- Error code big display -->
        <div class="mb-6">
            <span class="text-8xl font-black bg-gradient-to-br from-indigo-500 to-purple-600 bg-clip-text text-transparent select-none">
                {{.Code}}
            </span>
        </div>

        <!-- Icon -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 rounded-full bg-indigo-50 flex items-center justify-center">
                {{if eq .Code 404}}
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                {{else}}
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                {{end}}
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-2xl font-bold text-gray-800 mb-2">
            {{if eq .Code 404}}页面未找到{{else}}服务器错误{{end}}
        </h1>
        <p class="text-gray-500 mb-8 leading-relaxed">{{.Message}}</p>

        <!-- Back home button -->
        <a href="/"
           class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-medium rounded-full shadow-lg shadow-indigo-200 transition-all hover:shadow-xl hover:-translate-y-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            返回首页
        </a>
    </div>
</main>
{{end}}
