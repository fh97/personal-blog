<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}My Blog{{end}}</title>
    <link rel="icon" type="image/png" href="/personal-blog/favicon.png"/>
    <link rel="apple-touch-icon" href="/personal-blog/apple-touch-icon.png"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prose styles for post content */
        .prose h1 { font-size: 2em; font-weight: 700; margin: 1em 0 0.5em; line-height: 1.3; }
        .prose h2 { font-size: 1.5em; font-weight: 700; margin: 1.2em 0 0.5em; line-height: 1.3; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.3em; }
        .prose h3 { font-size: 1.25em; font-weight: 600; margin: 1em 0 0.5em; }
        .prose h4 { font-size: 1.1em; font-weight: 600; margin: 1em 0 0.4em; }
        .prose p { margin: 0.8em 0; line-height: 1.8; color: #374151; }
        .prose ul { list-style-type: disc; padding-left: 1.8em; margin: 0.8em 0; }
        .prose ol { list-style-type: decimal; padding-left: 1.8em; margin: 0.8em 0; }
        .prose li { margin: 0.3em 0; line-height: 1.7; color: #374151; }
        .prose a { color: #4f46e5; text-decoration: underline; }
        .prose a:hover { color: #7c3aed; }
        .prose blockquote { border-left: 4px solid #818cf8; padding: 0.5em 1em; background: #f5f3ff; margin: 1em 0; color: #6b7280; font-style: italic; border-radius: 0 0.5em 0.5em 0; }
        .prose code { background: #f3f4f6; color: #7c3aed; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; font-family: 'Menlo', 'Monaco', 'Consolas', monospace; }
        .prose pre { background: #1e1b4b; color: #e0e7ff; padding: 1.2em 1.5em; border-radius: 0.75em; overflow-x: auto; margin: 1em 0; }
        .prose pre code { background: transparent; color: inherit; padding: 0; font-size: 0.9em; }
        .prose img { max-width: 100%; border-radius: 0.5em; margin: 1em 0; }
        .prose hr { border: none; border-top: 2px solid #e5e7eb; margin: 2em 0; }
        .prose table { width: 100%; border-collapse: collapse; margin: 1em 0; }
        .prose th { background: #ede9fe; font-weight: 600; padding: 0.6em 1em; text-align: left; border: 1px solid #ddd6fe; }
        .prose td { padding: 0.6em 1em; border: 1px solid #e5e7eb; }
        .prose tr:nth-child(even) td { background: #faf5ff; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">
    {{block "content" .}}{{end}}

    <!-- ===== 悬浮音乐播放器 ===== -->
    <div id="music-player" style="
        position:fixed; bottom:24px; right:24px; z-index:9999;
        font-family:system-ui,sans-serif; user-select:none;
    ">
        <!-- 折叠态：只显示音符按钮 -->
        <button id="mp-toggle" onclick="mpToggle()" title="音乐播放器" style="
            width:48px; height:48px; border-radius:50%; border:none; cursor:pointer;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            box-shadow:0 4px 20px rgba(79,70,229,0.45);
            display:flex; align-items:center; justify-content:center;
            transition:transform .2s; color:#fff; font-size:20px;
        " onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            🎵
        </button>

        <!-- 展开态：完整播放器 -->
        <div id="mp-panel" style="
            display:none; position:absolute; bottom:60px; right:0;
            width:280px; background:#fff; border-radius:20px;
            box-shadow:0 8px 40px rgba(79,70,229,0.18);
            overflow:hidden;
        ">
            <!-- 顶部渐变封面区 -->
            <div style="background:linear-gradient(135deg,#4f46e5,#7c3aed); padding:16px 16px 12px; color:#fff;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
                    <span style="font-size:13px; opacity:.8; font-weight:600; letter-spacing:.5px;">♫ NOW PLAYING</span>
                    <button onclick="mpToggle()" style="background:rgba(255,255,255,.15); border:none; cursor:pointer; color:#fff; width:24px; height:24px; border-radius:50%; font-size:14px; line-height:24px; text-align:center;">✕</button>
                </div>
                <!-- 旋转唱片 -->
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="mp-disc" style="
                        width:52px; height:52px; border-radius:50%;
                        background:rgba(255,255,255,.15);
                        display:flex; align-items:center; justify-content:center;
                        font-size:24px; flex-shrink:0;
                        transition:all .3s;
                    ">🎵</div>
                    <div style="overflow:hidden;">
                        <div id="mp-title" style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;">加载中...</div>
                        <div id="mp-artist" style="font-size:12px; opacity:.75; margin-top:2px;">—</div>
                    </div>
                </div>
            </div>

            <!-- 进度条 -->
            <div style="padding:10px 16px 0;">
                <input id="mp-progress" type="range" min="0" max="100" value="0"
                    oninput="mpSeek(this.value)"
                    style="width:100%; height:4px; border-radius:2px; accent-color:#6d28d9; cursor:pointer;">
                <div style="display:flex; justify-content:space-between; font-size:11px; color:#9ca3af; margin-top:2px;">
                    <span id="mp-cur">0:00</span>
                    <span id="mp-dur">0:00</span>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div style="display:flex; align-items:center; justify-content:center; gap:16px; padding:10px 16px;">
                <button onclick="mpPrev()" title="上一首" style="background:none; border:none; cursor:pointer; font-size:18px; color:#6d28d9; padding:4px;">⏮</button>
                <button id="mp-play-btn" onclick="mpPlayPause()" style="
                    width:44px; height:44px; border-radius:50%; border:none; cursor:pointer;
                    background:linear-gradient(135deg,#4f46e5,#7c3aed);
                    color:#fff; font-size:18px;
                    box-shadow:0 2px 12px rgba(79,70,229,0.35);
                    display:flex; align-items:center; justify-content:center;
                ">▶</button>
                <button onclick="mpNext()" title="下一首" style="background:none; border:none; cursor:pointer; font-size:18px; color:#6d28d9; padding:4px;">⏭</button>
                <button id="mp-loop-btn" onclick="mpToggleLoop()" title="循环" style="background:none; border:none; cursor:pointer; font-size:16px; color:#9ca3af; padding:4px;">🔁</button>
            </div>

            <!-- 歌单列表 -->
            <div style="border-top:1px solid #f3f4f6; max-height:140px; overflow-y:auto; padding:6px 0;">
                <div id="mp-playlist" style="font-size:13px;"></div>
            </div>

            <!-- 音量 -->
            <div style="display:flex; align-items:center; gap:8px; padding:8px 16px 14px; border-top:1px solid #f3f4f6;">
                <span style="font-size:14px;">🔊</span>
                <input id="mp-vol" type="range" min="0" max="100" value="70"
                    oninput="mpSetVol(this.value)"
                    style="flex:1; height:4px; accent-color:#6d28d9; cursor:pointer;">
            </div>
        </div>
    </div>

    <audio id="mp-audio"></audio>

    <script>
    // ========== 歌单配置（可自定义替换） ==========
    const MP_PLAYLIST = [
        { title: "Chill Lo-fi Study",   artist: "Free BGM", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { title: "Ambient Flow",         artist: "Free BGM", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { title: "Light Piano",          artist: "Free BGM", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    ];
    // ================================================

    let mpIdx = 0, mpLooping = false, mpOpen = false;
    const audio = document.getElementById('mp-audio');

    function mpToggle() {
        mpOpen = !mpOpen;
        document.getElementById('mp-panel').style.display = mpOpen ? 'block' : 'none';
        if (mpOpen && !audio.src) mpLoad(0);
    }

    function mpLoad(idx) {
        mpIdx = idx;
        const t = MP_PLAYLIST[idx];
        audio.src = t.src;
        document.getElementById('mp-title').textContent  = t.title;
        document.getElementById('mp-artist').textContent = t.artist;
        mpRenderList();
    }

    function mpPlayPause() {
        if (audio.paused) {
            if (!audio.src) mpLoad(0);
            audio.play();
        } else {
            audio.pause();
        }
    }

    function mpPrev() { mpLoad((mpIdx - 1 + MP_PLAYLIST.length) % MP_PLAYLIST.length); audio.play(); }
    function mpNext() { mpLoad((mpIdx + 1) % MP_PLAYLIST.length); audio.play(); }

    function mpToggleLoop() {
        mpLooping = !mpLooping;
        audio.loop = mpLooping;
        document.getElementById('mp-loop-btn').style.color = mpLooping ? '#6d28d9' : '#9ca3af';
    }

    function mpSeek(v)   { if (audio.duration) audio.currentTime = audio.duration * v / 100; }
    function mpSetVol(v) { audio.volume = v / 100; }

    function fmtTime(s) {
        if (isNaN(s)) return '0:00';
        return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
    }

    audio.addEventListener('timeupdate', () => {
        const p = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
        document.getElementById('mp-progress').value = p;
        document.getElementById('mp-cur').textContent = fmtTime(audio.currentTime);
        document.getElementById('mp-dur').textContent = fmtTime(audio.duration);
    });

    audio.addEventListener('play',  () => {
        document.getElementById('mp-play-btn').textContent = '⏸';
        document.getElementById('mp-toggle').textContent = '🎶';
        mpDiscSpin(true);
    });
    audio.addEventListener('pause', () => {
        document.getElementById('mp-play-btn').textContent = '▶';
        document.getElementById('mp-toggle').textContent = '🎵';
        mpDiscSpin(false);
    });
    audio.addEventListener('ended', () => { if (!mpLooping) mpNext(); audio.play(); });

    let discAngle = 0, discRaf = null;
    function mpDiscSpin(on) {
        cancelAnimationFrame(discRaf);
        const disc = document.getElementById('mp-disc');
        if (!on) return;
        function step() {
            discAngle = (discAngle + 0.5) % 360;
            disc.style.transform = `rotate(${discAngle}deg)`;
            discRaf = requestAnimationFrame(step);
        }
        step();
    }

    function mpRenderList() {
        const el = document.getElementById('mp-playlist');
        el.innerHTML = MP_PLAYLIST.map((t, i) => `
            <div onclick="mpLoad(${i});audio.play()" style="
                padding:7px 16px; cursor:pointer; display:flex; align-items:center; gap:8px;
                background:${i===mpIdx?'#f5f3ff':'transparent'};
                color:${i===mpIdx?'#6d28d9':'#374151'};
                font-weight:${i===mpIdx?'600':'400'};
                transition:background .15s;
            " onmouseover="this.style.background='#f5f3ff'" onmouseout="this.style.background='${i===mpIdx?'#f5f3ff':'transparent'}'">
                <span style="font-size:11px; opacity:.5; width:14px;">${i+1}</span>
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.title}</span>
            </div>
        `).join('');
    }

    audio.volume = 0.7;
    </script>
    <!-- ===== 播放器结束 ===== -->
</body>
</html>
